<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Resolve the admin theme before first paint to avoid a flash. Mirrors
			// THEME_INIT_SCRIPT in @fieldstone/ui/theme.
			(function () {
				try {
					var p = localStorage.getItem('fs-admin-theme') || 'system';
					var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var t = p === 'system' ? (d ? 'dark' : 'light') : p;
					var e = document.documentElement;
					e.setAttribute('data-theme', t);
					e.style.colorScheme = t;
				} catch (_) {
					document.documentElement.setAttribute('data-theme', 'light');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
