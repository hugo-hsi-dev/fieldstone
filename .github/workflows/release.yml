name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  # Lets pnpm exchange a GitHub OIDC token for npm trusted publishing — no
  # long-lived NPM_TOKEN. Requires a Trusted Publisher configured per package on
  # npmjs.com (repo hugo-hsi-dev/fieldstone, workflow release.yml).
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # While changesets are pending this opens/updates a "Version Packages" PR;
      # once that PR merges (no pending changesets) it builds and publishes via
      # OIDC trusted publishing. No NODE_AUTH_TOKEN — pnpm detects the OIDC env.
      - name: Changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
