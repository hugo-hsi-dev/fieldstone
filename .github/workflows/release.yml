name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  # Lets pnpm exchange a GitHub OIDC token for npm trusted publishing — no
  # long-lived NPM_TOKEN. Requires a Trusted Publisher configured per package on
  # npmjs.com (repo hugo-hsi-dev/fieldstone, workflow release.yml).
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # OIDC trusted publishing needs npm CLI >= 11.5.1 for the OIDC handshake.
      # The npm bundled with Node (incl. 24.x) is older; without this, npm
      # publishes anonymously and the registry returns a misleading E404.
      # changeset publish shells out to `npm publish`, so the npm version is what
      # matters here (not pnpm's). See npm/cli#8976.
      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      # While changesets are pending this opens/updates a "Version Packages" PR;
      # once that PR merges (no pending changesets) it builds and publishes via
      # OIDC trusted publishing. No NODE_AUTH_TOKEN — npm detects the OIDC env.
      - name: Changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
