name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a fast force-push doesn't pile up jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lint + typecheck + unit tests + production build. No browser needed, so this
  # is the fast gate that should turn red first when something breaks.
  check:
    name: Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Read-only job; don't leave the git token in local config for later steps.
          persist-credentials: false

      # action-setup must run before setup-node so pnpm exists for the dependency cache.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the publishable packages first: typecheck, unit tests, and the app
      # build all resolve `@hugo-hsi-dev/*` through their built `dist`.
      - name: Build packages
        run: pnpm build:packages

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      # Validate the packages are publishable (publint + are-the-types-wrong).
      - name: Check publishability
        run: pnpm check:publish

      # The production/SSR build is otherwise never exercised (e2e runs against
      # `vite dev`), so gate it here. The Vite plugin reads DATABASE_URL at config time.
      - name: Build app
        run: pnpm --dir test/minimal build
        env:
          DATABASE_URL: local.db

  # End-to-end admin flows via Playwright against a freshly pushed SQLite schema.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Read-only job; don't leave the git token in local config for later steps.
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the downloaded browser binaries; keyed on the lockfile so a Playwright
      # version bump invalidates it. System deps are still (re)installed by setup:e2e.
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright (chromium)
        run: pnpm setup:e2e

      - name: Run e2e
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: test/minimal/playwright-report
          retention-days: 7
          if-no-files-found: ignore
