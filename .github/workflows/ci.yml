name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a fast force-push doesn't pile up jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lint + typecheck + unit tests + production build. No browser needed, so this
  # is the fast gate that should turn red first when something breaks.
  check:
    name: Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Read-only job; don't leave the git token in local config for later steps.
          persist-credentials: false

      # action-setup must run before setup-node so pnpm exists for the dependency cache.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the publishable packages first: typecheck, unit tests, and the app
      # build all resolve `@hugo-hsi-dev/*` through their built `dist`.
      - name: Build packages
        run: pnpm build:packages

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      # Validate the packages are publishable (publint + are-the-types-wrong).
      - name: Check publishability
        run: pnpm check:publish

      # The production/SSR build is otherwise never exercised (e2e runs against
      # `vite dev`), so gate it here. The Vite plugin reads DATABASE_URL at config time.
      - name: Build app
        run: pnpm --dir test/minimal build
        env:
          DATABASE_URL: local.db

  # End-to-end admin flows via Playwright against a freshly pushed SQLite schema.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Read-only job; don't leave the git token in local config for later steps.
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the downloaded browser binaries; keyed on the lockfile so a Playwright
      # version bump invalidates it. System deps are still (re)installed by setup:e2e.
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright (chromium)
        run: pnpm setup:e2e

      - name: Run e2e
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: test/minimal/playwright-report
          retention-days: 7
          if-no-files-found: ignore
